<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quinielas México - Dominguera</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        /* Encabezado Principal */
        .header {
            background-color: #800020; /* Color vino */
            color: white;
            padding: 15px;
            font-weight: bold;
        }
        .header h1 {
            margin: 0;
            font-size: 24px;
            letter-spacing: 1px;
        }
        .header h2 {
            margin: 5px 0 0 0;
            font-size: 18px;
            font-weight: normal;
        }
        /* Contenedor de la Tabla */
        .tabla-partidos {
            width: 100%;
            max-width: 500px;
            margin: 10px auto;
            border-collapse: collapse;
            background-color: white;
        }
        .tabla-partidos td {
            border: 1px solid #ccc;
            padding: 10px 5px;
            vertical-align: middle;
            font-size: 14px;
        }
        /* Estilo de los botones L, E, V */
        .opcion {
            font-weight: bold;
            cursor: pointer;
            width: 30px;
            user-select: none;
        }
        .opcion:hover {
            background-color: #ddd;
        }
        .seleccionado {
            background-color: #800020 !important;
            color: white;
        }
        /* Barra de Información */
        .barra-info {
            background-color: #600018;
            color: white;
            max-width: 500px;
            margin: 0 auto;
            padding: 8px 0;
            font-size: 14px;
            display: flex;
            justify-content: space-around;
            font-weight: bold;
        }
        .texto-amarillo { color: #fff200; }
        /* Sección de Informes */
        .seccion-informes {
            background-color: white;
            max-width: 500px;
            margin: 0 auto;
            padding: 10px 0;
            font-size: 18px;
            font-weight: bold;
        }
        .btn-facebook {
            background-color: #b00030;
            color: white;
            max-width: 500px;
            margin: 0 auto;
            padding: 10px 0;
            font-weight: bold;
            font-size: 16px;
        }
        /* Sección de Registro y Totales */
        .seccion-registro {
            max-width: 480px;
            margin: 15px auto;
            padding: 0 10px;
        }
        .total-texto {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .input-nombre {
            width: 100%;
            box-sizing: border-box;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            margin-bottom: 15px;
            text-transform: uppercase;
        }
        /* Botones de Acción */
        .bloque-botones {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        .btn-accion {
            width: 31%;
            padding: 12px 0;
            font-size: 16px;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-limpiar { background-color: #ff0033; }
        .btn-agregar { background-color: #1e7bd8; }
        .btn-aleatorio { background-color: #404040; }
        /* Botón de WhatsApp */
        .btn-whatsapp {
            background-color: #3cc226;
            color: white;
            width: 100%;
            padding: 15px 0;
            font-size: 18px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>QUINIELAS MÉXICO</h1>
        <h2>DOMINGUERA</h2>
    </div>

    <table class="tabla-partidos">
        <tr data-partido="1">
            <td class="opcion" onclick="seleccionar(this, 'L')">L</td>
            <td>América</td>
            <td class="opcion" onclick="seleccionar(this, 'E')">E</td>
            <td>Chivas</td>
            <td class="opcion" onclick="seleccionar(this, 'V')">V</td>
        </tr>
        <tr data-partido="2">
            <td class="opcion" onclick="seleccionar(this, 'L')">L</td>
            <td>Cruz Azul</td>
            <td class="opcion" onclick="seleccionar(this, 'E')">E</td>
            <td>Pumas</td>
            <td class="opcion" onclick="seleccionar(this, 'V')">V</td>
        </tr>
        <tr data-partido="3">
            <td class="opcion" onclick="seleccionar(this, 'L')">L</td>
            <td>Tigres</td>
            <td class="opcion" onclick="seleccionar(this, 'E')">E</td>
            <td>Monterrey</td>
            <td class="opcion" onclick="seleccionar(this, 'V')">V</td>
        </tr>
        <tr data-partido="4">
            <td class="opcion" onclick="seleccionar(this, 'L')">L</td>
            <td>Toluca</td>
            <td class="opcion" onclick="seleccionar(this, 'E')">E</td>
            <td>Pachuca</td>
            <td class="opcion" onclick="seleccionar(this, 'V')">V</td>
        </tr>
    </table>

    <div class="barra-info">
        <div>PRECIO: <span class="texto-amarillo">$10.00</span></div>
        <div>CIERRE: SÁBADO 11:50 P.M.</div>
    </div>

    <div class="seccion-informes">
        INFORMES: +5572246040
    </div>
    
    <a href="https://www.facebook.com/share/g/1DC7Z9rh9t/?mibextid=wwXIfr" target="_blank" style="text-decoration: none; display: block;">
        <div class="btn-facebook">
            f QUINIELAS MÉXICO
        </div>
    </a>

    <div class="seccion-registro">
        <div class="total-texto">TOTAL: $<span id="total-pago">0.00</span></div>
        
        <input type="text" id="nombre-participante" class="input-nombre" placeholder="NOMBRE DEL PARTICIPANTE">

        <div class="bloque-botones">
            <button class="btn-accion btn-limpiar" onclick="limpiarSelecciones()">Limpiar</button>
            <button class="btn-accion btn-hybrid btn-agregar" onclick="alert('Función para agregar a la lista')">Agregar</button>
            <button class="btn-accion btn-aleatorio" onclick="seleccionarAleatorio()">Aleatorio</button>
        </div>

        <button class="btn-whatsapp" onclick="enviarWhatsApp()">
            Enviar por WhatsApp
        </button>
    </div>

    <script>
        function seleccionar(celda, tipo) {
            let fila = celda.parentElement;
            let opciones = fila.getElementsByClassName('opcion');
            for (let op of opciones) { op.classList.remove('seleccionado'); }
            celda.classList.add('seleccionado');
            calcularTotal();
        }

        function calcularTotal() {
            let filas = document.querySelectorAll('.tabla-partidos tr');
            let seleccionados = document.querySelectorAll('.opcion.seleccionado').length;
            if(seleccionados === filas.length) {
                document.getElementById('total-pago').innerText = "10.00";
            } else {
                document.getElementById('total-pago').innerText = "0.00";
            }
        }

        function limpiarSelecciones() {
            let seleccionados = document.querySelectorAll('.opcion.seleccionado');
            for (let op of seleccionados) { op.classList.remove('seleccionado'); }
            document.getElementById('nombre-participante').value = "";
            calcularTotal();
        }

        function seleccionarAleatorio() {
            limpiarSelecciones();
            let filas = document.querySelectorAll('.tabla-partidos tr');
            filas.forEach(fila => {
                let opciones = fila.getElementsByClassName('opcion');
                let indiceAzar = Math.floor(Math.random() * opciones.length);
                opciones[indiceAzar].classList.add('seleccionado');
            });
            calcularTotal();
        }

        function enviarWhatsApp() {
            let nombre = document.getElementById('nombre-participante').value.trim();
            if(!nombre) {
                alert("Por favor, ingresa el nombre del participante.");
                return;
            }

            let filas = document.querySelectorAll('.tabla-partidos tr');
            let mensaje = `*QUINIELA DOMINGUERA*\n*Participante:* ${nombre}\n\n*Pronósticos:*\n`;
            let conteo = 0;

            filas.forEach((fila, index) => {
                let seleccionado = fila.querySelector('.opcion.seleccionado');
                if(seleccionado) {
                    let eleccion = seleccionado.innerText;
                    let eqLocal = fila.cells[1].innerText;
                    let eqVis = fila.cells[3].innerText;
                    mensaje += `${index + 1}. ${eqLocal} vs ${eqVis} -> *[ ${eleccion} ]*\n`;
                    conteo++;
                }
            });

            if(conteo < filas.length) {
                alert("Por favor, selecciona tus pronósticos para todos los partidos.");
                return;
            }

            // TU NÚMERO DE WHATSAPP YA CONFIGURADO AQUÍ:
            let miNumero = "525572246040"; 
            let url = `https://api.whatsapp.com/send?phone=${miNumero}&text=${encodeURIComponent(mensaje)}`;
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
